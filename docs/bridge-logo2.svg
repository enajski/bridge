<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Bridge logo</title>
  <desc id="desc">A coherent logo combining a bridge structure with playing-card elements.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102a43"/>
      <stop offset="100%" stop-color="#0b1f33"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fb3c8"/>
      <stop offset="100%" stop-color="#486581"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#0b2f5b"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <symbol id="spade" viewBox="0 0 20 24">
      <path d="M10 1C6.2 5.2 2 8.6 2 13c0 3.3 3.8 5.1 8 1.8 4.2 3.3 8 1.5 8-1.8 0-4.4-4.2-7.8-8-12zM8.2 15h3.6l1.2 7H7z" fill="currentColor"/>
    </symbol>
    <symbol id="heart" viewBox="0 0 20 20">
      <path d="M10 18S2 11.5 2 6.2C2 3.5 3.9 2 6 2c1.9 0 3.2 1.2 4 2.4C10.8 3.2 12.1 2 14 2c2.1 0 4 1.5 4 4.2C18 11.5 10 18 10 18z" fill="currentColor"/>
    </symbol>
    <symbol id="diamond" viewBox="0 0 16 20">
      <path d="M8 1l7 9-7 9-7-9z" fill="currentColor"/>
    </symbol>
    <symbol id="club" viewBox="0 0 20 24">
      <circle cx="10" cy="6" r="5" fill="currentColor"/>
      <circle cx="5" cy="13" r="5" fill="currentColor"/>
      <circle cx="15" cy="13" r="5" fill="currentColor"/>
      <path d="M8.2 15h3.6l1.2 7H7z" fill="currentColor"/>
    </symbol>

    <g id="card">
      <rect width="72" height="104" rx="10" fill="#f8fafc" stroke="#d9e2ec" stroke-width="2"/>
      <rect x="6" y="6" width="60" height="92" rx="7" fill="none" stroke="#edf2f7" stroke-width="2"/>
    </g>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle waterline, kept quiet so the mark remains the focus. -->
  <g opacity="0.28" fill="none" stroke="#7cc4fa" stroke-width="2" stroke-linecap="round">
    <path d="M70 334c42-12 84 12 126 0s84 12 126 0 84 12 126 0 84 12 126 0 84 12 156 0"/>
    <path d="M130 356c38-9 76 9 114 0s76 9 114 0 76 9 114 0 76 9 198 0" opacity="0.55"/>
  </g>

  <g filter="url(#softShadow)">
    <!-- Unified bridge arch. -->
    <path d="M112 246C205 148 304 107 400 107s195 41 288 139" fill="none" stroke="url(#steel)" stroke-width="14" stroke-linecap="round"/>
    <path d="M112 246C205 148 304 107 400 107s195 41 288 139" fill="none" stroke="#d9e2ec" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>

    <!-- Vertical hangers echoing card columns. -->
    <g stroke="#9fb3c8" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <line x1="184" y1="190" x2="184" y2="256"/>
      <line x1="256" y1="147" x2="256" y2="256"/>
      <line x1="328" y1="121" x2="328" y2="256"/>
      <line x1="400" y1="112" x2="400" y2="256"/>
      <line x1="472" y1="121" x2="472" y2="256"/>
      <line x1="544" y1="147" x2="544" y2="256"/>
      <line x1="616" y1="190" x2="616" y2="256"/>
    </g>

    <!-- Card deck as the roadway: same shape, rhythm, and perspective. -->
    <g transform="translate(124 220)">
      <g transform="rotate(-4 36 52)">
        <use href="#card"/>
        <text x="13" y="25" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#102a43">A</text>
        <use href="#spade" x="45" y="14" width="14" height="17" color="#102a43"/>
      </g>
      <g transform="translate(78 0) rotate(-3 36 52)">
        <rect width="72" height="104" rx="10" fill="url(#cardBack)" stroke="#2f80ed" stroke-width="2"/>
        <path d="M36 22l18 30-18 30-18-30z" fill="none" stroke="#7cc4fa" stroke-width="3" opacity="0.7"/>
      </g>
      <g transform="translate(156 0) rotate(-2 36 52)">
        <use href="#card"/>
        <text x="13" y="25" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#d64545">Q</text>
        <use href="#heart" x="45" y="14" width="15" height="15" color="#d64545"/>
      </g>
      <g transform="translate(234 0) rotate(-1 36 52)">
        <rect width="72" height="104" rx="10" fill="url(#cardBack)" stroke="#2f80ed" stroke-width="2"/>
        <path d="M20 30h32m-32 16h32m-32 16h32" stroke="#7cc4fa" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      </g>
      <g transform="translate(312 0) rotate(1 36 52)">
        <use href="#card"/>
        <text x="13" y="25" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#102a43">K</text>
        <use href="#club" x="45" y="12" width="15" height="18" color="#102a43"/>
      </g>
      <g transform="translate(390 0) rotate(3 36 52)">
        <rect width="72" height="104" rx="10" fill="url(#cardBack)" stroke="#2f80ed" stroke-width="2"/>
        <path d="M36 22l18 30-18 30-18-30z" fill="none" stroke="#7cc4fa" stroke-width="3" opacity="0.7"/>
      </g>
      <g transform="translate(468 0) rotate(4 36 52)">
        <use href="#card"/>
        <text x="13" y="25" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#d64545">J</text>
        <use href="#diamond" x="47" y="13" width="12" height="16" color="#d64545"/>
      </g>
    </g>

    <!-- Clean foundation line ties the cards into one bridge. -->
    <rect x="104" y="318" width="592" height="16" rx="8" fill="#486581"/>
    <rect x="126" y="322" width="548" height="4" rx="2" fill="#d9e2ec" opacity="0.35"/>
  </g>

  <!-- Wordmark: closer tracking, clearer hierarchy. -->
  <text x="400" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="800" letter-spacing="10" text-anchor="middle" fill="#f8fafc">BRIDGE</text>
  <text x="400" y="371" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" text-anchor="middle" fill="#7cc4fa" opacity="0.82">VERIFICATION-AWARE WORKFLOW TOOLING</text>
</svg>
