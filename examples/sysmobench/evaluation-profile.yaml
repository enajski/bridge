artifact: evaluation-profile
evaluation-id: sysmobench-spin-truth-check
subject: spin-trace-pipeline
target-suite: SysMoBench
suite-kind: benchmark
working-directory: ../../../SysMoBench
task-selector:
  - spin
command-steps:
  - id: spin-trace-validation
    kind: trace-validation
    role: conformance
    command: >-
      source .venv/bin/activate &&
      METHOD=${BRIDGE_SYSMOBENCH_METHOD:-direct_call} &&
      MODEL=${BRIDGE_SYSMOBENCH_MODEL:-gpt5} &&
      LATEST=$(ls -dt output/compilation_check/tla/spin/${METHOD}_${MODEL}/* | head -n1) &&
      SPEC=$LATEST/spin.tla &&
      CFG=$LATEST/spin.cfg &&
      sysmobench --task spin --method $METHOD --model $MODEL --metric transition_validation
      --spec-file "$SPEC" --config-file "$CFG" --tv-agent codex --tv-model gpt-5.4-mini --yes
    result-parser:
      type: regex-status
      rules:
        - stream: stdout
          regex: 'Transition Validation Results: ✓ PASS'
          status: passed
        - stream: stderr
          regex: 'Transition Validation Results: ✓ PASS'
          status: passed
        - stream: stdout
          regex: 'Transition Validation Results: ✗ FAIL'
          status: failed
        - stream: stderr
          regex: 'Transition Validation Results: ✗ FAIL'
          status: failed
      captures:
        - stream: stdout
          regex: 'Error: ([^\n]+)'
          as: primary-failure
          failure-signal?: true
        - stream: stderr
          regex: 'Error: ([^\n]+)'
          as: primary-failure
          failure-signal?: true
      path-extractors:
        - stream: stdout
          regex: 'Workspace: (.+)'
          as: workspace-dir
        - stream: stderr
          regex: 'Workspace: (.+)'
          as: workspace-dir
      suggested-labels:
        - spec-unfaithful
        - reproduced
  - id: spin-invariant-verification
    kind: model-check
    role: exploration
    command: >-
      source .venv/bin/activate &&
      METHOD=${BRIDGE_SYSMOBENCH_METHOD:-direct_call} &&
      MODEL=${BRIDGE_SYSMOBENCH_MODEL:-gpt5} &&
      LATEST=$(ls -dt output/compilation_check/tla/spin/${METHOD}_${MODEL}/* | head -n1) &&
      SPEC=$LATEST/spin.tla &&
      CFG=$LATEST/spin.cfg &&
      sysmobench --task spin --method $METHOD --model $MODEL --metric invariant_verification
      --spec-file "$SPEC" --config-file "$CFG" --tlc-timeout 180
    result-parser:
      type: regex-status
      rules:
        - stream: stdout
          regex: 'Semantics Evaluation Results: ✓ PASS'
          status: passed
        - stream: stderr
          regex: 'Semantics Evaluation Results: ✓ PASS'
          status: passed
        - stream: stdout
          regex: 'Semantics Evaluation Results: ✗ FAIL'
          status: failed
        - stream: stderr
          regex: 'Semantics Evaluation Results: ✗ FAIL'
          status: failed
      path-extractors:
        - stream: stdout
          regex: 'Using output directory: (.+)'
          as: output-dir
metric-mappings:
  - external-key: spin-trace-validation.primary-failure
    bridge-key: sysmobench/transition-validation-primary-failure
    kind: external
bridge-metrics:
  - artifact-valid-count
  - artifact-invalid-count
  - converged-subject-count
  - regressed-subject-count
  - open-obligation-count
output-dir: .bridge/artifacts/evaluations
artifact-dir: .bridge/artifacts
notes:
  - "Example regression profile is canonical truth-check fixture for SysMoBench spin."
  - "Local project profiles should be compared against this fixture with debug-profile and evidence dry-runs first."
